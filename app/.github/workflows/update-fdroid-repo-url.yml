name: Update F-Droid repo URL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-repo-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update repo URL
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("repo/index.xml")
          old = 'url="https://yunfie-twitter.github.io/Illustia-dev/repo"'
          new = 'url="https://yunfi.f5.si/Illustia-dev/repo"'

          text = path.read_text(encoding="utf-8")
          if old not in text:
              raise SystemExit("old repo URL not found in repo/index.xml")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo/index.xml
          git commit -m "Update F-Droid repo URL"
          git push origin HEAD:gh-pages
